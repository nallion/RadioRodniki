name: Build RadioRodniki appx

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # ручной запуск кнопкой на GitHub

jobs:
  build:
    runs-on: windows-2019  # VS 2019 + все UWP SDK предустановлены

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Install Windows 10 SDK 10586
      shell: powershell
      run: |
        # SDK 10586 нужен для WP10 (Windows.Mobile target)
        $url = "https://go.microsoft.com/fwlink/p/?LinkId=619296"
        $out = "$env:TEMP\sdksetup.exe"
        Write-Host "Downloading Windows 10 SDK 10586..."
        Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
        Write-Host "Installing..."
        Start-Process -FilePath $out -ArgumentList "/quiet /norestart /features OptionId.WindowsSoftwareDevelopmentKit" -Wait
        Write-Host "Done"

    - name: Generate self-signed certificate
      shell: powershell
      run: |
        $cert = New-SelfSignedCertificate `
          -Type Custom `
          -Subject "CN=RadioRodniki" `
          -KeyUsage DigitalSignature `
          -FriendlyName "RadioRodniki" `
          -CertStoreLocation "Cert:\CurrentUser\My" `
          -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $thumb = $cert.Thumbprint
        Write-Host "Certificate thumbprint: $thumb"
        echo "CERT_THUMBPRINT=$thumb" >> $env:GITHUB_ENV

        # Экспортируем .cer для установки на телефон
        Export-Certificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\RadioRodniki.cer" -Type CERT
        Write-Host "Certificate exported"

    - name: Build solution
      shell: powershell
      run: |
        msbuild RadioRodniki.sln `
          /p:Configuration=Release `
          /p:Platform=ARM `
          /p:AppxBundle=Never `
          /p:AppxPackageSigningEnabled=true `
          /p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:AppxPackageDir="$env:GITHUB_WORKSPACE\AppxPackages\\" `
          /restore `
          /verbosity:minimal

    - name: Find appx file
      shell: powershell
      run: |
        $appx = Get-ChildItem -Path "AppxPackages" -Recurse -Filter "*.appx" | Select-Object -First 1
        if ($appx) {
          Write-Host "Found: $($appx.FullName)"
          Copy-Item $appx.FullName "$env:GITHUB_WORKSPACE\RadioRodniki.appx"
          echo "APPX_FOUND=true" >> $env:GITHUB_ENV
        } else {
          Write-Host "No appx found, listing output:"
          Get-ChildItem -Path "AppxPackages" -Recurse
          echo "APPX_FOUND=false" >> $env:GITHUB_ENV
        }

    - name: Upload appx
      uses: actions/upload-artifact@v3
      with:
        name: RadioRodniki-WP10
        path: |
          RadioRodniki.appx
          RadioRodniki.cer
        retention-days: 30

    - name: Upload full package folder (fallback)
      uses: actions/upload-artifact@v3
      with:
        name: RadioRodniki-AppxPackages
        path: AppxPackages/
        retention-days: 30
