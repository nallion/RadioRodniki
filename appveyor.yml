image: Visual Studio 2019

platform: ARM

configuration: Release

before_build:
  - ps: |
      Write-Host "=== UnionMetadata ==="
      Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\UnionMetadata\" -ErrorAction SilentlyContinue

      Write-Host "=== All Windows.winmd files ==="
      Get-ChildItem "C:\Program Files (x86)\Windows Kits\" -Recurse -Filter "Windows.winmd" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }

      Write-Host "=== MSBuild Extensions ==="
      Get-ChildItem "C:\Program Files (x86)\MSBuild\Microsoft\WindowsXaml\" -ErrorAction SilentlyContinue
      Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Microsoft\WindowsXaml\" -ErrorAction SilentlyContinue

      # Находим Windows.winmd и прописываем путь в env
      $winmd = Get-ChildItem "C:\Program Files (x86)\Windows Kits\" -Recurse -Filter "Windows.winmd" -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($winmd) {
        Write-Host "Using: $($winmd.FullName)"
        # Патчим csproj — вставляем реальный путь
        $csproj = "BackgroundAudioTask\BackgroundAudioTask.csproj"
        $xml = [xml](Get-Content $csproj)
        $ns = "http://schemas.microsoft.com/developer/msbuild/2003"
        $nsm = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
        $nsm.AddNamespace("ms", $ns)

        # Добавляем ItemGroup с Reference
        $ig = $xml.CreateElement("ItemGroup", $ns)

        $ref = $xml.CreateElement("Reference", $ns)
        $ref.SetAttribute("Include", "Windows")
        $hint = $xml.CreateElement("HintPath", $ns)
        $hint.InnerText = $winmd.FullName
        $iswmd = $xml.CreateElement("IsWinMDFile", $ns)
        $iswmd.InnerText = "true"
        $priv = $xml.CreateElement("Private", $ns)
        $priv.InnerText = "false"
        $ref.AppendChild($hint) | Out-Null
        $ref.AppendChild($iswmd) | Out-Null
        $ref.AppendChild($priv) | Out-Null
        $ig.AppendChild($ref) | Out-Null

        $xml.Project.AppendChild($ig) | Out-Null
        $xml.Save((Resolve-Path $csproj))
        Write-Host "Patched csproj with Windows.winmd path"
      } else {
        Write-Host "ERROR: Windows.winmd not found anywhere!"
        exit 1
      }

      # Сертификат
      $cert = New-SelfSignedCertificate `
        -Type Custom `
        -Subject "CN=RadioRodniki" `
        -KeyUsage DigitalSignature `
        -FriendlyName "RadioRodniki" `
        -CertStoreLocation "Cert:\CurrentUser\My" `
        -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
      $env:CERT_THUMBPRINT = $cert.Thumbprint
      Export-Certificate -Cert $cert -FilePath "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.cer" -Type CERT
      Write-Host "Cert: $($cert.Thumbprint)"

build_script:
  - ps: |
      msbuild RadioRodniki.sln `
        /p:Configuration=Release `
        /p:Platform=ARM `
        /p:AppxBundle=Never `
        /p:AppxPackageSigningEnabled=true `
        /p:PackageCertificateThumbprint="$env:CERT_THUMBPRINT" `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:AppxPackageDir="$env:APPVEYOR_BUILD_FOLDER\AppxPackages\\" `
        /verbosity:normal

after_build:
  - ps: |
      $appx = Get-ChildItem -Path "AppxPackages" -Recurse -Filter "*.appx" -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($appx) {
        Copy-Item $appx.FullName "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.appx"
        Write-Host "appx ready: $($appx.FullName)"
      } else {
        Write-Host "No appx found"
        Get-ChildItem -Path "AppxPackages" -Recurse -ErrorAction SilentlyContinue
      }

artifacts:
  - path: RadioRodniki.appx
    name: RadioRodniki-appx
  - path: RadioRodniki.cer
    name: RadioRodniki-cer
