image: Visual Studio 2019

platform: ARM

configuration: Release

before_build:
  - ps: |
      # Генерируем сертификат
      $cert = New-SelfSignedCertificate `
        -Type Custom `
        -Subject "CN=RadioRodniki" `
        -KeyUsage DigitalSignature `
        -FriendlyName "RadioRodniki" `
        -CertStoreLocation "Cert:\CurrentUser\My" `
        -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
      $env:CERT_THUMBPRINT = $cert.Thumbprint
      Write-Host "Cert thumbprint: $($cert.Thumbprint)"
      # Экспортируем .cer для телефона
      Export-Certificate -Cert $cert -FilePath "RadioRodniki.cer" -Type CERT
      Write-Host "Certificate exported"

build_script:
  - ps: |
      msbuild RadioRodniki.sln `
        /p:Configuration=Release `
        /p:Platform=ARM `
        /p:AppxBundle=Never `
        /p:AppxPackageSigningEnabled=true `
        /p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:AppxPackageDir="$env:APPVEYOR_BUILD_FOLDER\AppxPackages\\" `
        /restore `
        /verbosity:minimal

after_build:
  - ps: |
      $appx = Get-ChildItem -Path "AppxPackages" -Recurse -Filter "*.appx" | Select-Object -First 1
      if ($appx) {
        Write-Host "Found: $($appx.FullName)"
        Copy-Item $appx.FullName "RadioRodniki.appx"
      } else {
        Write-Host "appx not found, listing:"
        Get-ChildItem -Path "AppxPackages" -Recurse
      }

artifacts:
  - path: RadioRodniki.appx
    name: RadioRodniki
  - path: RadioRodniki.cer
    name: Certificate
