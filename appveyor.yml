image: Visual Studio 2019

platform:
  - x86
  - ARM

configuration:
  - Release

before_build:
  - nuget restore RodnikiRadio.sln

build:
  project: RodnikiRadio.sln
  verbosity: minimal

after_build:
  - ps: |
      # Скрипт для поиска собранного пакета и публикации его в артефакты
      Get-ChildItem -Recurse -Filter "*.appxbundle" | % { Push-AppveyorArtifact $_.FullName }

notifications:
  - provider: Email
    to:
      - your-email@example.com
    on_build_success: true
