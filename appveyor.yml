image: Visual Studio 2019

platform:
  - ARM

configuration:
  - Release

before_build:
  - nuget restore RodnikiRadio.sln
  - ps: |
      if (!(Test-Path Assets)) { New-Item -ItemType Directory -Path Assets }
      # Подгружаем сборку для работы с графикой
      Add-Type -AssemblyName System.Drawing
      $files = @("StoreLogo.png", "Square150x150Logo.png", "Square44x44Logo.png", "Wide310x150Logo.png", "SplashScreen.png")
      foreach ($file in $files) {
          $path = "Assets\$file"
          if (!(Test-Path $path)) {
              # Создаем реальный пустой PNG 1x1
              $bmp = New-Object System.Drawing.Bitmap(1, 1)
              $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
              $bmp.Dispose()
              Write-Host "Created valid PNG: $path"
          }
      }

build:
  project: RodnikiRadio.sln
  verbosity: minimal

after_build:
  - ps: Get-ChildItem -Recurse -Filter "*.appxbundle" | % { Push-AppveyorArtifact $_.FullName }
