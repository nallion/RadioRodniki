image: Visual Studio 2019

platform: ARM

configuration: Release

install:
  - cmd: mkdir BackgroundAudioTask\bin\ARM\Release 2>nul & exit 0


before_build:
  - ps: >-
      $cert = New-SelfSignedCertificate
      -Type Custom -Subject "CN=RadioRodniki"
      -KeyUsage DigitalSignature -FriendlyName "RadioRodniki"
      -CertStoreLocation "Cert:\CurrentUser\My"
      -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}");
      $env:CERT_THUMBPRINT = $cert.Thumbprint;
      Export-Certificate -Cert $cert -FilePath "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.cer" -Type CERT;
      Write-Host "Cert $($cert.Thumbprint)"

build_script:
  - cmd: >-
      "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\Roslyn\csc.exe"
      /noconfig /nostdlib+ /platform:ARM /target:winmdobj /langversion:7.3 /optimize+ /utf8output
      /reference:"C:\Program Files (x86)\Windows Kits\10\UnionMetadata\10.0.19041.0\Windows.winmd"
      /reference:"C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5\mscorlib.dll"
      /reference:"C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5\System.Runtime.dll"
      /reference:"C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5\System.Runtime.InteropServices.WindowsRuntime.dll"
      /reference:"C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5\System.ObjectModel.dll"
      /out:"BackgroundAudioTask\bin\ARM\Release\BackgroundAudioTask.winmdobj"
      BackgroundAudioTask\MyBackgroundAudioTask.cs
      BackgroundAudioTask\Properties\AssemblyInfo.cs

  - cmd: >-
      "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe"
      build_main.proj
      /p:VS2019="C:\Program Files (x86)\Microsoft Visual Studio\2019\Community"
      /p:OutputPath="%APPVEYOR_BUILD_FOLDER%\RadioRodniki\bin\ARM\Release\\"
      /p:AppxPackageDir="%APPVEYOR_BUILD_FOLDER%\AppxPackages\\"
      /p:PackageCertificateThumbprint="%CERT_THUMBPRINT%"
      /verbosity:normal

after_build:
  - ps: |
      $appx = Get-ChildItem "AppxPackages" -Recurse -Filter "*.appx" -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($appx) {
        Copy-Item $appx.FullName "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.appx"
        Write-Host "appx ready"
      } else {
        Write-Host "No appx"
        Get-ChildItem "AppxPackages" -Recurse -ErrorAction SilentlyContinue
      }

artifacts:
  - path: RadioRodniki.appx
    name: RadioRodniki-appx
  - path: RadioRodniki.cer
    name: RadioRodniki-cer
