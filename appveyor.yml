image: Visual Studio 2019

platform: ARM

configuration: Release

install:
  - cmd: mkdir BackgroundAudioTask\bin\ARM\Release 2>nul & exit 0
  - cmd: mkdir RadioRodniki\bin\ARM\Release 2>nul & exit 0

before_build:
  - ps: |
      $cert = New-SelfSignedCertificate `
        -Type Custom -Subject "CN=RadioRodniki" `
        -KeyUsage DigitalSignature -FriendlyName "RadioRodniki" `
        -CertStoreLocation "Cert:\CurrentUser\My" `
        -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
      $env:CERT_THUMBPRINT = $cert.Thumbprint
      Export-Certificate -Cert $cert -FilePath "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.cer" -Type CERT
      Write-Host "Cert: $($cert.Thumbprint)"

build_script:
  - ps: |
      $csc   = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\Roslyn\csc.exe"
      $winmd = "C:\Program Files (x86)\Windows Kits\10\UnionMetadata\10.0.19041.0\Windows.winmd"
      $refs  = "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETCore\v4.5"

      # ── Шаг 1: BackgroundAudioTask ──
      Write-Host "=== BackgroundAudioTask ==="
      & $csc /noconfig /nostdlib+ /platform:ARM /target:winmdobj /langversion:7.3 /optimize+ /utf8output `
        /reference:"$winmd" `
        /reference:"$refs\mscorlib.dll" `
        /reference:"$refs\System.Runtime.dll" `
        /reference:"$refs\System.Runtime.InteropServices.WindowsRuntime.dll" `
        /reference:"$refs\System.ObjectModel.dll" `
        /out:"BackgroundAudioTask\bin\ARM\Release\BackgroundAudioTask.winmdobj" `
        BackgroundAudioTask\MyBackgroundAudioTask.cs `
        BackgroundAudioTask\Properties\AssemblyInfo.cs
      if ($LASTEXITCODE -ne 0) { throw "BackgroundAudioTask failed" }
      Write-Host "BackgroundAudioTask OK"

      # ── Шаг 2: Компилируем главное приложение ──
      Write-Host "=== RadioRodniki main app ==="
      & $csc /noconfig /nostdlib+ /platform:ARM /target:appcontainerexe /langversion:7.3 /optimize+ /utf8output `
        /reference:"$winmd" `
        /reference:"$refs\mscorlib.dll" `
        /reference:"$refs\System.Runtime.dll" `
        /reference:"$refs\System.Runtime.InteropServices.WindowsRuntime.dll" `
        /reference:"$refs\System.ObjectModel.dll" `
        /reference:"$refs\System.Runtime.WindowsRuntime.dll" `
        /out:"RadioRodniki\bin\ARM\Release\RadioRodniki.exe" `
        RadioRodniki\App.xaml.cs `
        RadioRodniki\App.g.cs `
        RadioRodniki\MainPage.xaml.cs `
        RadioRodniki\MainPage.g.cs `
        RadioRodniki\Properties\AssemblyInfo.cs
      if ($LASTEXITCODE -ne 0) { throw "RadioRodniki compile failed" }
      Write-Host "RadioRodniki compiled OK"

      # ── Шаг 3: Упаковываем AppX ──
      Write-Host "=== Packaging AppX ==="
      $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object { $_.FullName -notlike "*arm*" } | Select-Object -Last 1
      $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -notlike "*arm*" } | Select-Object -Last 1
      Write-Host "makeappx: $($makeappx.FullName)"
      Write-Host "signtool:  $($signtool.FullName)"

      # Создаём папку пакета
      $pkg = "$env:APPVEYOR_BUILD_FOLDER\AppxLayout"
      New-Item -ItemType Directory -Force -Path $pkg | Out-Null

      # Копируем файлы
      Copy-Item "RadioRodniki\Package.appxmanifest" "$pkg\AppxManifest.xml"
      Copy-Item "RadioRodniki\bin\ARM\Release\RadioRodniki.exe" "$pkg\"
      Copy-Item "BackgroundAudioTask\bin\ARM\Release\BackgroundAudioTask.winmdobj" "$pkg\BackgroundAudioTask.winmd"
      New-Item -ItemType Directory -Force -Path "$pkg\Assets" | Out-Null
      Copy-Item "RadioRodniki\Assets\*" "$pkg\Assets\"

      # Собираем .appx
      New-Item -ItemType Directory -Force -Path "$env:APPVEYOR_BUILD_FOLDER\AppxPackages" | Out-Null
      & $makeappx.FullName pack /d "$pkg" /p "$env:APPVEYOR_BUILD_FOLDER\AppxPackages\RadioRodniki.appx" /l
      if ($LASTEXITCODE -ne 0) { throw "makeappx failed" }

      # Подписываем
      & $signtool.FullName sign /fd SHA256 /sha1 "$env:CERT_THUMBPRINT" "$env:APPVEYOR_BUILD_FOLDER\AppxPackages\RadioRodniki.appx"
      if ($LASTEXITCODE -ne 0) { throw "signtool failed" }
      Write-Host "Package signed OK"

after_build:
  - ps: |
      $appx = Get-ChildItem "AppxPackages" -Filter "*.appx" | Select-Object -First 1
      if ($appx) {
        Copy-Item $appx.FullName "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.appx"
        Write-Host "appx ready: $($appx.FullName)"
      } else {
        Write-Host "No appx found"
      }

artifacts:
  - path: RadioRodniki.appx
    name: RadioRodniki-appx
  - path: RadioRodniki.cer
    name: RadioRodniki-cer
