# appveyor.yml для RadioRodniki (Lumia ARM)
image: Visual Studio 2019

configuration: Release
platform: ARM

environment:
  CERT_PASSWORD: 1234

# --- Установка сертификата и проверка репозитория ---
install:
  - ps: |
      Write-Host "=== Проверка содержимого репозитория после клона ==="
      Get-ChildItem -Recurse

      # Генерация self-signed сертификата для подписи AppX
      $cert = New-SelfSignedCertificate `
        -Type CodeSigningCert `
        -Subject "CN=RodnikiRadio" `
        -CertStoreLocation "cert:\CurrentUser\My"

      Export-PfxCertificate `
        -cert $cert `
        -FilePath RodnikiRadio.pfx `
        -Password (ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText)

      Write-Host "=== После создания сертификата ==="
      Get-ChildItem -Recurse

# --- Сборка проекта ---
build_script:
  - ps: |
      Write-Host "=== Проверка папки RodnikiRadio перед сборкой ==="
      Get-ChildItem RodnikiRadio -Recurse

  - ps: |
      Write-Host "=== Запуск MSBuild для сборки и создания AppX ==="
      msbuild RodnikiRadio.sln /m `
        /t:Restore,Build,CreateAppxPackage `
        /p:Configuration=Release `
        /p:Platform=ARM `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:AppxBundle=Never `
        /p:AppxPackageDir=AppPackages\ `
        /p:PackageCertificateKeyFile=RodnikiRadio.pfx `
        /p:PackageCertificatePassword=$env:CERT_PASSWORD

# --- Отладка после сборки ---
after_build:
  - ps: |
      Write-Host "=== Содержимое AppPackages после сборки ==="
      Get-ChildItem AppPackages -Recurse

      Write-Host "=== Содержимое корня репозитория ==="
      Get-ChildItem -Recurse

# --- Артефакты для скачивания ---
artifacts:
  - path: '**\*.appx'
    name: RodnikiRadio_ARM
  - path: RodnikiRadio.pfx
    name: RodnikiRadio_PFX
