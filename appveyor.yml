image: Visual Studio 2019

platform:
  - ARM

configuration:
  - Release

before_build:
  - nuget restore RodnikiRadio.sln
  - ps: |
      if (!(Test-Path Assets)) { New-Item -ItemType Directory -Path Assets -Force }
      
      # Минимальный валидный PNG файл 1x1 (в виде массива байтов)
      $pngBytes = [System.Byte[]] @(
          0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A, 0x00, 0x00, 0x00, 0x0D,
          0x49, 0x48, 0x44, 0x52, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01,
          0x08, 0x02, 0x00, 0x00, 0x00, 0x90, 0x77, 0x53, 0xDE, 0x00, 0x00, 0x00,
          0x0C, 0x49, 0x44, 0x41, 0x54, 0x08, 0xD7, 0x63, 0xF8, 0xFF, 0xFF, 0x3F,
          0x00, 0x05, 0xFE, 0x02, 0xFE, 0xDC, 0x44, 0x74, 0x06, 0x00, 0x00, 0x00,
          0x00, 0x49, 0x45, 0x4E, 0x44, 0xAE, 0x42, 0x60, 0x82
      )

      $files = @("StoreLogo.png", "Square150x150Logo.png", "Square44x44Logo.png", "Wide310x150Logo.png", "SplashScreen.png")
      
      foreach ($file in $files) {
          $path = "Assets\$file"
          [System.IO.File]::WriteAllBytes($path, $pngBytes)
          Write-Host "File created successfully: $path"
      }

build:
  project: RodnikiRadio.sln
  verbosity: minimal

after_build:
  - ps: Get-ChildItem -Recurse -Filter "*.appxbundle" | % { Push-AppveyorArtifact $_.FullName }
