image: Visual Studio 2019

platform: ARM

configuration: Release

install:
  - ps: |
      # Устанавливаем Windows 10 SDK 10586 если нет
      $sdkPath = "C:\Program Files (x86)\Windows Kits\10\UnionMetadata\10.0.10586.0"
      if (!(Test-Path $sdkPath)) {
        Write-Host "Installing Windows 10 SDK 10586..."
        choco install windows-sdk-10.0 --version 10.0.10586.0 -y --no-progress
      } else {
        Write-Host "SDK 10586 already present"
      }

      # Показываем доступные SDK
      Write-Host "=== Available SDKs ==="
      Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\UnionMetadata\" -ErrorAction SilentlyContinue | Select-Object Name

before_build:
  - ps: |
      # Генерируем сертификат для подписи
      $cert = New-SelfSignedCertificate `
        -Type Custom `
        -Subject "CN=RadioRodniki" `
        -KeyUsage DigitalSignature `
        -FriendlyName "RadioRodniki" `
        -CertStoreLocation "Cert:\CurrentUser\My" `
        -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
      $env:CERT_THUMBPRINT = $cert.Thumbprint
      Write-Host "Cert: $($cert.Thumbprint)"

      # Экспортируем .cer для установки на телефон
      Export-Certificate -Cert $cert `
        -FilePath "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.cer" -Type CERT
      Write-Host "Certificate exported"

  # NuGet restore
  - nuget restore RadioRodniki.sln

build_script:
  - ps: |
      msbuild RadioRodniki.sln `
        /p:Configuration=Release `
        /p:Platform=ARM `
        /p:AppxBundle=Never `
        /p:AppxPackageSigningEnabled=true `
        /p:PackageCertificateThumbprint="$env:CERT_THUMBPRINT" `
        /p:UapAppxPackageBuildMode=SideloadOnly `
        /p:AppxPackageDir="$env:APPVEYOR_BUILD_FOLDER\AppxPackages\\" `
        /verbosity:normal

after_build:
  - ps: |
      Write-Host "=== Looking for appx ==="
      Get-ChildItem -Path "AppxPackages" -Recurse -ErrorAction SilentlyContinue
      $appx = Get-ChildItem -Path "AppxPackages" -Recurse -Filter "*.appx" `
        -ErrorAction SilentlyContinue | Select-Object -First 1
      if ($appx) {
        Write-Host "Found: $($appx.FullName)"
        Copy-Item $appx.FullName "$env:APPVEYOR_BUILD_FOLDER\RadioRodniki.appx"
      } else {
        Write-Host "appx not found"
      }

artifacts:
  - path: RadioRodniki.appx
    name: RadioRodniki-appx
  - path: RadioRodniki.cer
    name: RadioRodniki-cer
